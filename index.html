<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Timeline</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    font-size: 18px;
    background: rgba(20,20,20,0.7);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

/* TIMELINE */
.timeline {
    padding: 10px;
}

/* SECTION */
.section {
    margin-bottom: 30px;
}

/* DATE */
.date {
    font-size: 16px;
    margin: 10px 5px;
    opacity: 0.7;
    border-left: 3px solid #555;
    padding-left: 10px;
    transition: 0.3s;
}

.date.active {
    color: #00ffcc;
    border-left: 3px solid #00ffcc;
    font-weight: bold;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap: 8px;
}

.grid img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 14px;
}

/* VIEWER */
.viewer {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: 0.25s;
    pointer-events: none;
}

.viewer.show {
    opacity: 1;
    pointer-events: auto;
}

.viewer img {
    max-width: 100%;
    max-height: 100%;
}

.close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
}

/* REVEAL ANIMATION */
.reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.6s;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* REELS */
.reel-container {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.reel-container video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    scroll-snap-align: start;
}
</style>
</head>

<body>

<div class="header">❤️ Our Memories</div>

<div id="timeline" class="timeline"></div>

<!-- IMAGE VIEWER -->
<div id="viewer" class="viewer">
    <div class="close" onclick="closeViewer()">✕</div>
    <img id="viewerImg">
</div>

<script>
const timelineData = [
    { folder: "date1", title: "3 January 2026 ❤️", count: 29 },
    { folder: "date2", title: "7 January 2026 ✨", count: 22 },
    { folder: "date3", title: "21 March 2026 🌙", count: 30 },
    { folder: "date4", title: "23 March 2026 💫", count: 66 },
    { folder: "date5", title: "25 March 2026 💖", count: 40 }
];

/* BUILD TIMELINE */
function buildTimeline() {
    let container = document.getElementById("timeline");

    timelineData.forEach(data => {

        let section = document.createElement("div");
        section.className = "section reveal";

        let title = document.createElement("div");
        title.className = "date";
        title.innerText = data.title;

        let grid = document.createElement("div");
        grid.className = "grid";

        for (let i = 1; i <= data.count; i++) {
            let img = document.createElement("img");
            img.src = `images/${data.folder}/${i}.jpeg`;
            img.onclick = () => openViewer(img.src);
            grid.appendChild(img);
        }

        section.appendChild(title);
        section.appendChild(grid);
        container.appendChild(section);
    });

    /* REELS */
    let reels = document.createElement("div");
    reels.className = "section reveal";

    let reelTitle = document.createElement("div");
    reelTitle.className = "date";
    reelTitle.innerText = "Reels 🎥";

    let reelContainer = document.createElement("div");
    reelContainer.className = "reel-container";

    for (let i = 1; i <= 3; i++) {
        let video = document.createElement("video");
        video.src = `images/videos/${i}.mp4`;
        video.controls = true;
        reelContainer.appendChild(video);
    }

    reels.appendChild(reelTitle);
    reels.appendChild(reelContainer);
    container.appendChild(reels);
}

/* IMAGE VIEWER */
function openViewer(src) {
    document.getElementById('viewer').classList.add("show");
    document.getElementById('viewerImg').src = src;
}

function closeViewer() {
    document.getElementById('viewer').classList.remove("show");
}

/* SCROLL REVEAL */
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("active");
        }
    });
}, { threshold: 0.2 });

/* INIT */
buildTimeline();

setTimeout(() => {
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}, 100);

/* DATE HIGHLIGHT */
window.addEventListener("scroll", () => {
    let sections = document.querySelectorAll(".section");

    sections.forEach(sec => {
        let rect = sec.getBoundingClientRect();

        if (rect.top < 150 && rect.bottom > 150) {
            document.querySelectorAll(".date").forEach(d => d.classList.remove("active"));
            let d = sec.querySelector(".date");
            if (d) d.classList.add("active");
        }
    });
});
</script>

</body>
</html>
