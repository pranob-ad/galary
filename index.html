<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery App</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: white;
    padding: 15px;
    font-size: 20px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 8px;
}

.card {
    border-radius: 12px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* NAVBAR */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.nav-item {
    font-size: 14px;
    color: gray;
}

.nav-item.active {
    color: #007aff;
    font-weight: bold;
}

/* FULLSCREEN VIEWER */
.viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
}

.viewer img {
    max-width: 100%;
    max-height: 100%;
}

.close {
    position: absolute;
    top: 15px;
    right: 20px;
    color: white;
    font-size: 28px;
    cursor: pointer;
}
.spacer { height: 70px; }
</style>
</head>

<body>

<div class="header">📸 PRAYAN Gallery</div>

<div id="gallery" class="gallery"></div>

<div class="spacer"></div>

<div class="navbar">
    <div class="nav-item active" onclick="loadImages('date1',29,this)">Date 1</div>
    <div class="nav-item" onclick="loadImages('date2',22,this)">Date 2</div>
    <div class="nav-item" onclick="loadImages('date3',30,this)">Date 3</div>
</div>

<!-- VIEWER -->
<div id="viewer" class="viewer">
    <span class="close" onclick="closeViewer()">×</span>
    <img id="viewerImg">
</div>

<script>
let currentImages = [];
let currentIndex = 0;

function loadImages(folder, count, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');

    let gallery = document.getElementById('gallery');
    gallery.innerHTML = "";
    currentImages = [];

    for (let i = 1; i <= count; i++) {
        let path = `images/${folder}/${i}.jpeg`;
        currentImages.push(path);

        let card = document.createElement("div");
        card.className = "card";

        let img = document.createElement("img");
        img.src = path;

        img.onclick = () => openViewer(i - 1);

        card.appendChild(img);
        gallery.appendChild(card);
    }
}

function openViewer(index) {
    currentIndex = index;
    document.getElementById('viewer').style.display = "flex";
    document.getElementById('viewerImg').src = currentImages[index];
}

function closeViewer() {
    document.getElementById('viewer').style.display = "none";
}

/* SWIPE LOGIC */
let startX = 0;

document.getElementById('viewer').addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
});

document.getElementById('viewer').addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextImage();
    if (endX - startX > 50) prevImage();
});

function nextImage() {
    if (currentIndex < currentImages.length - 1) {
        currentIndex++;
        document.getElementById('viewerImg').src = currentImages[currentIndex];
    }
}

function prevImage() {
    if (currentIndex > 0) {
        currentIndex--;
        document.getElementById('viewerImg').src = currentImages[currentIndex];
    }
}

// default load
loadImages('date1',29,document.querySelector('.nav-item'));
</script>

</body>
</html>
