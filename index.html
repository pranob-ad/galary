<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRAYAN Gallery</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    background: rgba(20,20,20,0.6);
    position: sticky;
    top: 0;
}

/* GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    padding: 10px;
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 14px;
}

/* NAVBAR */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    backdrop-filter: blur(12px);
    background: rgba(20,20,20,0.7);
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
}

.nav-item {
    color: #aaa;
}

.nav-item.active {
    color: white;
}

/* VIEWER */
.viewer {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transform: scale(1.05);
    transition: all 0.25s ease;
    pointer-events: none;
}

.viewer.show {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
}

.viewer img {
    max-width: 100%;
    max-height: 100%;
    touch-action: none;
    transition: transform 0.2s ease;
}

/* CLOSE */
.close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
}

/* COUNTER */
.counter {
    position: absolute;
    bottom: 20px;
    font-size: 14px;
    opacity: 0.7;
}

.spacer { height: 70px; }
</style>
</head>

<body>

<div class="header">📸 Gallery</div>

<div id="gallery" class="gallery"></div>
<div class="spacer"></div>

<div class="navbar">
    <div class="nav-item active" onclick="loadImages('date1',29,this)">Date 1</div>
    <div class="nav-item" onclick="loadImages('date2',22,this)">Date 2</div>
    <div class="nav-item" onclick="loadImages('date3',30,this)">Date 3</div>
    <div class="nav-item" onclick="loadImages('date4',66,this)">Date 4</div>
</div>

<div id="viewer" class="viewer">
    <div class="close" onclick="closeViewer()">✕</div>
    <img id="viewerImg">
    <div id="counter" class="counter"></div>
</div>

<script>
let currentImages = [];
let currentIndex = 0;

/* ZOOM STATE */
let scale = 1, lastScale = 1;
let posX = 0, posY = 0;
let startX = 0, startY = 0;

/* SWIPE STATE */
let velocityX = 0, lastX = 0, lastTime = 0;
let isDragging = false, isVertical = false, verticalY = 0;

/* LOAD IMAGES */
function loadImages(folder, count, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');

    let gallery = document.getElementById('gallery');
    gallery.innerHTML = "";
    currentImages = [];

    for (let i = 1; i <= count; i++) {
        let path = `images/${folder}/${i}.jpeg`;
        currentImages.push(path);

        let img = document.createElement("img");
        img.src = path;
        img.loading = "lazy";
        img.onclick = () => openViewer(i - 1);

        let card = document.createElement("div");
        card.className = "card";
        card.appendChild(img);
        gallery.appendChild(card);
    }
}

/* OPEN VIEWER */
function openViewer(index) {
    currentIndex = index;
    document.getElementById('viewer').classList.add("show");
    document.getElementById('viewerImg').src = currentImages[index];
    resetZoom();
    updateCounter();
}

/* CLOSE VIEWER */
function closeViewer() {
    document.getElementById('viewer').classList.remove("show");
}

/* RESET ZOOM */
function resetZoom() {
    scale = 1;
    lastScale = 1;
    posX = 0;
    posY = 0;
    updateTransform();
}

/* APPLY TRANSFORM */
function updateTransform() {
    document.getElementById('viewerImg').style.transform =
        `translate(${posX}px, ${posY}px) scale(${scale})`;
}

/* COUNTER */
function updateCounter() {
    document.getElementById('counter').innerText =
        (currentIndex + 1) + " / " + currentImages.length;
}

/* TOUCH EVENTS */
const viewer = document.getElementById('viewer');
const img = document.getElementById('viewerImg');

viewer.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
        startDistance = getDistance(e.touches);
    } else {
        isDragging = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        lastX = startX;
        lastTime = Date.now();
        isVertical = false;
    }
});

viewer.addEventListener('touchmove', e => {

    /* PINCH ZOOM */
    if (e.touches.length === 2) {
        let newDistance = getDistance(e.touches);
        scale = lastScale * (newDistance / startDistance);
        scale = Math.max(1, Math.min(scale, 4));
        updateTransform();
        return;
    }

    if (!isDragging) return;

    let x = e.touches[0].clientX;
    let y = e.touches[0].clientY;

    let dx = x - startX;
    let dy = y - startY;

    /* DETECT DIRECTION */
    if (Math.abs(dy) > Math.abs(dx)) isVertical = true;

    /* VERTICAL CLOSE */
    if (isVertical && scale === 1) {
        verticalY = dy;
        viewer.style.background = `rgba(0,0,0,${1 - Math.abs(dy)/400})`;
        img.style.transform = `translateY(${dy}px) scale(0.95)`;
        return;
    }

    /* DRAG WHEN ZOOMED */
    if (scale > 1) {
        posX += (x - lastX);
        posY += (y - startY);
        updateTransform();
    }

    /* HORIZONTAL SWIPE */
    if (scale === 1 && !isVertical) {
        posX = dx;

        if ((currentIndex === 0 && dx > 0) ||
            (currentIndex === currentImages.length - 1 && dx < 0)) {
            posX *= 0.3;
        }

        img.style.transform = `translateX(${posX}px)`;

        let now = Date.now();
        velocityX = (x - lastX) / (now - lastTime);
        lastX = x;
        lastTime = now;
    }
});

viewer.addEventListener('touchend', () => {

    lastScale = scale;
    isDragging = false;

    /* VERTICAL */
    if (isVertical) {
        if (Math.abs(verticalY) > 120) closeViewer();
        else {
            img.style.transform = "translateY(0)";
            viewer.style.background = "black";
        }
        return;
    }

    /* ZOOMED → NO SWIPE */
    if (scale > 1) return;

    /* SWIPE WITH MOMENTUM */
    if (Math.abs(posX) > 80 || Math.abs(velocityX) > 0.5) {
        if (posX < 0 && currentIndex < currentImages.length - 1)
            slide(-1);
        else if (posX > 0 && currentIndex > 0)
            slide(1);
        else resetPosition();
    } else {
        resetPosition();
    }

    posX = 0;
});

/* SLIDE */
function slide(dir) {
    img.style.transition = "transform 0.25s ease";
    img.style.transform = `translateX(${dir * 100}%)`;

    setTimeout(() => {
        currentIndex -= dir;
        img.src = currentImages[currentIndex];
        img.style.transition = "none";
        img.style.transform = `translateX(${-dir * 100}%)`;

        setTimeout(() => {
            img.style.transition = "transform 0.25s ease";
            img.style.transform = "translateX(0)";
        }, 10);

        updateCounter();
    }, 200);
}

/* RESET POSITION */
function resetPosition() {
    img.style.transition = "transform 0.2s ease";
    img.style.transform = "translateX(0)";
}

/* DISTANCE (PINCH) */
function getDistance(touches) {
    let dx = touches[0].clientX - touches[1].clientX;
    let dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
}

/* DEFAULT LOAD */
loadImages('date1',29,document.querySelector('.nav-item'));
</script>

</body>
</html>
